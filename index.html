<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="utf-8"/>
    <title>London Cultural Explorer - Ultra Edition</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no"/>
    
    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --apple-blue: #007AFF;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1d1d1f;
            --text-sec: #86868b;
        }

        body { margin: 0; padding: 0; font-family: 'SF Pro Display', -apple-system, sans-serif; overflow: hidden; background: #f5f5f7; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }

        header {
            position: absolute; top: 0; width: 100%; height: 70px;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
            color: var(--text-main); font-weight: 800; font-size: 24px; z-index: 10;
            border-bottom: 0.5px solid rgba(0,0,0,0.1); letter-spacing: -0.5px;
        }

        /* Struktura e re e ikonave */
        .marker-container {
            width: 70px;
            height: 70px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto !important;
        }

        .marker-icon {
            width: 100%;
            height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transition: transform 0.3s cubic-bezier(0.2, 0, 0.2, 1);
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.2));
            will-change: transform;
        }

        .marker-container:hover .marker-icon {
            transform: scale(1.3) translateY(-5px);
            z-index: 999;
        }

        #sidePanel {
            position: absolute; 
            top: 85px; 
            right: -100%; /* E nisim nga jashtë ekranit */
            width: 400px; 
            max-width: 85vw; /* Ky rresht ndalon daljen jashtë ekranit në telefon */
            height: calc(100% - 110px); 
            background: var(--panel-bg);
            backdrop-filter: blur(40px); 
            -webkit-backdrop-filter: blur(40px);
            border-radius: 28px; 
            box-shadow: -15px 20px 50px rgba(0,0,0,0.1);
            transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1); 
            z-index: 100; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid rgba(255,255,255,0.8);
            overflow: hidden;
        }
        
        #sidePanel.open { right: 25px; }
        .panel-scroll { padding: 35px; overflow-y: auto; flex-grow: 1; }
        .panel-image { width: 100%; height: 260px; object-fit: cover; border-bottom: 1px solid #f2f2f7; background: #eee; }
        .tag { color: var(--apple-blue); font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
        h2 { font-size: 34px; font-weight: 800; margin: 0 0 25px 0; letter-spacing: -1.2px; line-height: 1.1; }
        .section-box { background: rgba(0,0,0,0.03); padding: 25px; border-radius: 24px; margin-bottom: 25px; border: 1px solid rgba(0,0,0,0.01); }
        .section-title { font-size: 14px; font-weight: 800; color: var(--text-sec); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        p { line-height: 1.7; color: #3a3a3c; font-size: 16px; margin: 0; text-align: justify; }
        .close-btn { background: var(--text-main); color: white; border: none; padding: 22px; width: 100%; font-weight: 700; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .close-btn:hover { background: #000; }

        .compass-btn {
            position: absolute; bottom: 40px; left: 30px;
            width: 60px; height: 60px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.12); z-index: 10;
            border: 1px solid #e5e5e7; transition: 0.5s; font-size: 24px;
        }

        /* --- KODI SPECIFIK PER TELEFONIN --- */
        @media (max-width: 600px) {
            #sidePanel {
                top: 75px; /* Pak më lart që të mos mbulojë shumë hartën */
                right: -110%;
                width: calc(100% - 30px); /* I jep pak hapësirë anash që të duket si "kartë" */
                height: calc(100% - 90px);
            }

            #sidePanel.open {
                right: 15px; /* Distanca nga anash kur hapet në telefon */
            }

            .panel-image {
                height: 180px; /* Zvogëlojmë foton që të shohim më shumë tekst */
            }

            .panel-scroll {
                padding: 20px; /* Zvogëlojmë hapësirat boshe */
            }

            h2 {
                font-size: 24px; /* Shkrimi i titullit më i vogël */
            }

            p {
                font-size: 14px; /* Shkrimi i historisë më i vogël */
            }

            .section-box {
                padding: 15px; /* Kutitë e informacionit më kompakte */
            }
        }
        /* Kjo është "receta" se si do të shfaqet ikona */
        @keyframes dropIn {
            0% { 
                opacity: 0; 
                transform: translateY(-20px) scale(0.5); 
            }
            100% { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            }
        }
        
        /* Kjo i thotë ikonës ta përdorë recetën sapo të krijohet */
        .marker-icon {
            animation: dropIn 0.6s cubic-bezier(0.2, 0, 0.2, 1) backwards;
        }
    </style>
</head>
<body>

<header>London Cultural Explorer</header>
<div id="map"></div>
<button class="compass-btn" onclick="resetView()">🧭</button>

<div id="sidePanel">
    <img id="p-img" class="panel-image" src="">
    <div class="panel-scroll">
        <div id="p-tag" class="tag"></div>
        <h2 id="p-title"></h2>
        <div class="section-box">
            <div class="section-title">Historia e Plotë</div>
            <p id="p-hist"></p>
        </div>
        <div class="section-box">
            <div class="section-title">Fakte të Veçanta</div>
            <p id="p-fact"></p>
        </div>
        <div class="section-box">
            <div class="section-title">Pse konsiderohet Ikonë?</div>
            <p id="p-why"></p>
        </div>
    </div>
    <button class="close-btn" onclick="closePanel()">Kthehu në Hartë</button>
</div>

<script>
    const map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/voyager-gl-style/style.json',
        center: [-0.1278, 51.5074],
        zoom: 12,
        pitch: 0,
        bearing: 0,
        antialias: true
    });

const places = [
        {
            name: "Natural History Museum", coords: [-0.1764, 51.4967], tag: "Science & Nature",
            icon: "icons/NaturalHistoryMuseum.PNG",
            history: "Opened in 1881, the Natural History Museum originated from the extensive collection of Sir Hans Sloane. Architect Alfred Waterhouse designed the stunning Neo-Romanesque building, often referred to as a 'Cathedral of Nature'. The use of terracotta tiles on the facade was an innovation of the time, designed to withstand the polluted air of Victorian London, while intricate sculptures of animals and plants decorate the walls.",
            facts: "The museum houses over 80 million biological and geological specimens, including items collected by Charles Darwin himself. The main attraction in the Hintze Hall is 'Hope', a massive blue whale skeleton suspended from the ceiling. It is also a world-leading center for the study of dinosaurs and meteorites.",
            why: "Visitors come here not just to see dinosaurs, but to experience an interactive journey through our planet's evolution. The monumental architecture and educational exhibits make it one of the most inspiring places in the world for both children and adults."
        },
        {
            name: "British Museum", coords: [-0.1270, 51.5194], tag: "World Culture",
            icon: "icons/BritishMuseum.PNG",
            history: "Founded in 1753, the British Museum was the first national public museum in the world. It was established to showcase the history, art, and culture of humanity on a global scale. The current building, with its iconic Greek-style columns, is a masterpiece of neoclassical architecture. The central Great Court, redesigned in 2000 with its spectacular glass roof, has become a symbol of the modern museum.",
            facts: "The collection numbers over 8 million objects, reflecting the history of human culture from its beginnings to the present. Its most famous treasures include the Rosetta Stone, the Elgin Marbles, and the largest collection of Egyptian mummies outside of Egypt. It attracts over 6 million visitors annually.",
            why: "It is the only place where you can witness the entire history of humanity under one roof, connecting ancient civilizations with our modern world through artifacts that changed the course of time."
        },
        {
            name: "Tower Bridge", coords: [-0.0754, 51.5055], tag: "Engineering",
            icon: "icons/TowerBridge.PNG",
            history: "Completed in 1894, Tower Bridge was designed to ease road traffic while maintaining river access to London's busy docks. It took eight years of intensive labor and over 11,000 tons of steel to build. While it looks like an ancient stone castle, the exterior is actually a decorative cladding over a modern steel frame, styled to match the nearby Tower of London.",
            facts: "The bridge is a 'bascule' bridge, meaning its arms lift to allow ships to pass. Originally powered by giant coal-fired steam engines, the system is now electric, though the original Victorian machinery is still preserved as a museum. The high-level glass walkways offer a thrilling view 42 meters above the River Thames.",
            why: "It is not just a bridge, but London's most recognizable visual landmark. Walking across the glass floor while cars and boats pass beneath your feet is a unique London experience."
        },
        {
            name: "Big Ben", coords: [-0.1246, 51.5007], tag: "National Icon",
            icon: "icons/BigBen.PNG",
            history: "The Elizabeth Tower, universally known as Big Ben, was completed in 1859 as part of the reconstruction of the Palace of Westminster after the Great Fire. It represents the pinnacle of British Neo-Gothic style. During WWII, the tower was damaged by a bomb, but the clock never stopped, becoming a global symbol of British resilience and precision.",
            facts: "Big Ben is actually the name of the 13-ton Great Bell inside the tower, not the clock or the tower itself. The clock faces are made of 312 pieces of opal glass and are still adjusted traditionally by adding or removing old penny coins on the pendulum to maintain accuracy.",
            why: "The sound of Big Ben is the voice of London. It chimes every hour with an authority that resonates across the city, reminding us of the importance of time and Britain's rich political heritage."
        },
        {
            name: "Buckingham Palace", coords: [-0.1419, 51.5014], tag: "Royalty",
            icon: "icons/BuckinghamPalace.PNG",
            history: "The official London residence of British monarchs since 1837, Buckingham Palace is the headquarters of the Monarchy. Originally built in 1703 as a townhouse for the Duke of Buckingham, it was expanded by architects John Nash and Edward Blore. It has been the home of Queen Victoria, Elizabeth II, and now King Charles III.",
            facts: "The palace has 775 rooms, including 19 State Rooms open to the public during summer, 52 Royal bedrooms, and 92 offices. Its garden is the largest private garden in London. When the King is in residence, the Royal Standard flag flies; if he is away, the Union Jack is raised.",
            why: "It is the heart of royal tradition. The Changing of the Guard ceremony at the palace gates is one of the world's most famous displays of military discipline and living history."
        },
        {
            name: "Kew Gardens", coords: [-0.2933, 51.4833], tag: "Botany",
            icon: "icons/KewGardens.PNG",
            history: "The Royal Botanic Gardens at Kew were founded in 1759 and are now a UNESCO World Heritage site. What began as a small exotic garden has grown into the largest botanical and mycological collection in the world. The Palm House, completed in 1848, was the world's first large-scale structural iron building without supporting columns.",
            facts: "Kew holds over 50,000 different species of living plants. It is also home to the Millennium Seed Bank, a critical global project preserving seeds from species at risk of extinction. Another attraction is 'The Hive', an installation that vibrates in sync with the activity of real bees in the gardens.",
            why: "It is a magical escape from the city's noise, where you can walk above the trees on the Treetop Walkway and enjoy the beauty of nature in all its diverse forms."
        },
        {
            name: "Tower of London", coords: [-0.0759, 51.5081], tag: "History",
            icon: "icons/TowerOfLondon.PNG",
            history: "Built by William the Conqueror in 1066 as a symbol of Norman power, the Tower of London has served as a fortress, royal palace, treasury, and even a zoo. It is the stage for many of the most significant and often bloody events in English history, including the imprisonment and execution of famous figures like Anne Boleyn.",
            facts: "Today, the Tower protects the Crown Jewels, a priceless collection including crowns and scepters adorned with legendary diamonds. An old legend says that if the six ravens living in the tower ever leave, the Tower and the Kingdom will fall. Thus, the ravens are carefully protected by a dedicated Ravenmaster.",
            why: "For anyone who loves history and mystery, the Tower is a top destination. The Yeoman Warders (Beefeaters) tell captivating stories of the royal intrigues that took place within these ancient walls."
        },
        {
            name: "London Eye", coords: [-0.1195, 51.5033], tag: "Entertainment",
            icon: "icons/LondonEye.PNG",
            history: "Opened in 2000 to celebrate the new Millennium, the London Eye was originally intended as a temporary structure for five years. However, its massive popularity led to it becoming a permanent and iconic part of the London skyline along the South Bank of the River Thames.",
            facts: "The wheel has 32 glass capsules, each weighing 10 tons and holding up to 25 people. Interestingly, the capsules are numbered up to 33, as number 13 is skipped due to superstition. A full rotation takes 30 minutes, moving at a slow 26cm per second, allowing passengers to board without the wheel stopping.",
            why: "It offers the most spectacular 360-degree views of London. On a clear day, you can see as far as 40 kilometers, even spotting Windsor Castle on the horizon."
        },
        {
            name: "National Gallery", coords: [-0.1283, 51.5089], tag: "Art",
            icon: "icons/NationalGallery.PNG",
            history: "Located in Trafalgar Square since 1838, the National Gallery was established to ensure that fine European art was accessible to everyone, not just the wealthy. Unlike other European museums created from royal collections, this gallery was formed through government purchases for the public interest.",
            facts: "It houses over 2,300 paintings dating from the mid-13th century to 1900. Here, you can see world masterpieces such as Van Gogh’s 'Sunflowers', Holbein’s 'The Ambassadors', and rare works by Leonardo da Vinci. Entry remains free to all visitors.",
            why: "It is a place where you can stand face-to-face with original paintings you've seen in history books. The calm atmosphere and the grandeur of the works provide a spiritual oasis in the heart of the city."
        },
        {
            name: "Regent's Park", coords: [-0.1569, 51.5313], tag: "Park",
            icon: "icons/Regent'sPark.PNG",
            history: "Designed by architect John Nash in 1811, the park was created for the Prince Regent as a luxury residential and leisure area. Nash originally planned to build 50 villas within the park, but only a few were completed. The park was officially opened to the general public in 1841.",
            facts: "This is home to London's largest rose garden, Queen Mary's Gardens, featuring over 12,000 roses. Within the park, you also find the London Zoo (the world's oldest scientific zoo) and the famous Open Air Theatre, where Shakespearean plays are performed under the stars every summer.",
            why: "It is the 'green lung' of central London. Whether you want to boat on the lake or enjoy the scent of thousands of roses, this park offers a royal elegance not found elsewhere."
        },
        {
            name: "Richmond Park", coords: [-0.2763, 51.4442], tag: "Nature",
            icon: "icons/RichmondPark.PNG",
            history: "This massive park was created by King Charles I in the 17th century as a royal deer-hunting park. It is the largest of London's eight Royal Parks and is designated as a National Nature Reserve due to its ecological importance and ancient woodland.",
            facts: "The main attraction is the 600 wild red and fallow deer that have roamed freely here for centuries. The oak trees in Richmond are among the oldest in Britain, some over 700 years old. From the highest point in the park, there is a protected view of St Paul's Cathedral miles away.",
            why: "It is the only place in London where you can feel like you are in the wild wilderness, far from any urban sign, offering a peace and fresh air that is unmatched."
        },
        {
            name: "Winter Wonderland", coords: [-0.1600, 51.5080], tag: "Event",
            icon: "icons/WinterWonderland.PNG",
            history: "What started as a small Christmas market in 2007 has grown into Europe's largest festive festival. Every year, Hyde Park is transformed into a magical city of lights, rides, and holiday joy for millions of visitors.",
            facts: "It features the UK’s largest outdoor ice rink, built around a Victorian bandstand. It also includes the 'Magical Ice Kingdom' with giant sculptures, ice bars, and massive ferris wheels that lift you high above the glowing city lights.",
            why: "It is the ultimate festive experience. The scent of mulled wine, the twinkling lights, and the endless games create an unforgettable holiday memory for every family."
        },
        {
            name: "Notting Hill Carnival", coords: [-0.2010, 51.5160], tag: "Culture",
            icon: "icons/NottingHillFestival.PNG",
            history: "This carnival began in 1966 as a way to bring the local community together following racial tensions. Today, it has evolved into the largest street festival in Europe and a powerful symbol of London's multicultural identity.",
            facts: "During the last two days of August, the streets of Notting Hill fill with about 2.5 million people. Steel bands, giant feathered costumes, and Caribbean street food like 'Jerk Chicken' are the core elements that make this celebration unique.",
            why: "It is an explosion of energy, color, and unity. Being part of the crowd dancing to Caribbean rhythms is a powerful experience of positivity and respect for diversity."
        },
        {
            name: "London Design Festival", coords: [-0.1722, 51.4966], tag: "Design",
            icon: "icons/London Design Festival.PNG",
            history: "Created in 2003, this festival aims to promote London as the design capital of the world. It brings together the brightest minds in design, architecture, and innovation to showcase how design can improve our daily lives.",
            facts: "The festival spans the entire city with over 400 installations and events. Its main hub is the V&A Museum, which becomes filled with modern art pieces that often challenge gravity and technology through creative engineering.",
            why: "For anyone passionate about beauty and innovation, this festival offers a glimpse into the future. It is where wild ideas become reality through the power of design."
        },
        {
            name: "Chelsea Flower Show", coords: [-0.1583, 51.4874], tag: "Flowers",
            icon: "icons/ChelseaFlowerShow.PNG",
            history: "This is the most famous gardening event on the planet, held annually since 1913 at the Royal Hospital Chelsea. For the British, this is not just a flower show, but a major national event attended by the highest levels of society.",
            facts: "The show attracts over 150,000 visitors, including members of the Royal Family. The show gardens created here cost hundreds of thousands of pounds to build and often set global trends for home and landscape design.",
            why: "It is an incredible visual feast. Even if you are not a gardener, the level of detail and the sheer beauty of the floral displays will leave you speechless."
        },
        {
            name: "London Bridge", coords: [-0.0877, 51.5079], tag: "Bridge",
            icon: "icons/LondonBridge.PNG",
            history: "London Bridge has a 2,000-year history. The Romans built the first wooden bridge here around 50 AD. The current concrete and steel bridge was opened by Queen Elizabeth II in 1973, replacing the famous Victorian stone bridge.",
            facts: "There is a famous misconception: many tourists buy postcards of Tower Bridge thinking it is London Bridge. The previous 1831 bridge was sold in 1968 and transported to the USA, where it now stands as an attraction in Arizona.",
            why: "Beyond its history, the bridge offers one of the best views of the City’s financial skyline and The Shard, which stands right at its southern end."
        }
    ];

    places.forEach(place => {
        const container = document.createElement('div');
        container.className = 'marker-container';
    
        const iconDiv = document.createElement('div');
        iconDiv.className = 'marker-icon';
        iconDiv.style.backgroundImage = `url("${place.icon}")`;
        
        // --- KJO ESHTE SHTESA ---
        // I jep nje vonese rastesore nga 0 ne 0.5 sekonda cdo ikone
        iconDiv.style.animationDelay = `${Math.random() * 0.5}s`; 
        // ------------------------
    
        container.appendChild(iconDiv);
    
        new maplibregl.Marker({
            element: container,
            anchor: 'center'
        })
        .setLngLat(place.coords)
        .addTo(map);
    
        container.addEventListener('click', () => {
            document.getElementById('p-title').innerText = place.name;
            document.getElementById('p-tag').innerText = place.tag;
            document.getElementById('p-img').src = place.icon;
            document.getElementById('p-hist').innerText = place.history;
            document.getElementById('p-fact').innerText = place.facts;
            document.getElementById('p-why').innerText = place.why;
            
            document.getElementById('sidePanel').classList.add('open');
            
            map.flyTo({
                center: place.coords, zoom: 16, pitch: 65, bearing: -25,
                speed: 0.6, curve: 1.2, essential: true
            });
        });
    });

    function resetView() { map.flyTo({ bearing: 0, pitch: 0, zoom: 12.5, speed: 0.8 }); }
    function closePanel() { 
        document.getElementById('sidePanel').classList.remove('open'); 
        map.flyTo({ zoom: 12.5, pitch: 0, bearing: 0, speed: 0.7 }); 
    }
</script>
</body>
</html>
